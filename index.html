        <!-- Apply saved/system theme early to avoid flash -->
        <script>
            (function () {
                try {
                    var key = "theme";
                    var saved = localStorage.getItem(key);
                    var prefersDark =
                        window.matchMedia &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches;
                    var applied = saved || (prefersDark ? "dark" : "light");
                    document.documentElement.setAttribute(
                        "data-theme",
                        applied,
                    );
                } catch (_) {}
            })();
        </script>

                        </div>

                                    <div class="flex flex-wrap items-center gap-2 mb-1">
                                        <span
                                            class="badge badge-outline badge-sm"
                                            x-text="exp.date"
                                        ></span>
                                        <span
                                            class="font-semibold text-base"
                                            x-text="exp.company"
                                        ></span>
                                        <span class="opacity-50">·</span>
                                        <span
                                            class="italic text-primary text-sm"
                                            x-text="exp.role"
                                        ></span>
                                    </div>

                                    <p
                                        class="text-sm text-base-content/80"
                                        x-text="exp.description"
                                    ></p>

                                    <!-- Activities -->
                                    <template x-if="exp.activities.length > 0">
                                        <ul class="mt-2 list-disc pl-5 space-y-1 text-sm text-base-content/80">
                                            <template
                                                x-for="(act, ai) in exp.activities"
                                                :key="ai"
                                            >
                                                <li x-text="act"></li>
                                            </template>
                                        </ul>
                                    </template>

                                    <!-- Tech Stack -->
                                    <template x-if="exp.techStack.length > 0">
                                        <div class="mt-3 flex flex-wrap gap-1">
                                            <template
                                                x-for="tech in exp.techStack"
                                                :key="tech"
                                            >
                                                <span
                                                    class="badge badge-xs badge-ghost"
                                                    x-text="tech"
                                                ></span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
